<!-- step-basic-info.component.html -->
<div class="step-card">
  <div>
    <h2 class="step-title">Basic Information</h2>
    <p class="step-sub">Tell clients about your salon</p>
  </div>

  <div class="field-wrap">
    <label class="field-label">Salon name *</label>
    <input class="field-input" type="text" [(ngModel)]="form.salonName" placeholder="Toni & Guy, Koramangala">
  </div>

  <!-- Area -->
  <div class="field-wrap">
    <label class="field-label">Area *</label>
    <mat-select class="field-input field-select" [(ngModel)]="form.area" placeholder="Select area">
      <mat-option *ngFor="let a of areas" [value]="a">{{ a }}</mat-option>
    </mat-select>
  </div>

  <!-- Price range -->
  <div class="field-wrap">
    <label class="field-label">Price range *</label>
    <mat-select class="field-input field-select" [(ngModel)]="form.priceLevel">
      <mat-option [value]="1">₹ Budget</mat-option>
      <mat-option [value]="2">₹₹ Moderate</mat-option>
      <mat-option [value]="3">₹₹₹ Premium</mat-option>
      <mat-option [value]="4">₹₹₹₹ Luxury</mat-option>
    </mat-select>
  </div>

  <div class="field-wrap">
    <label class="field-label">Full address *</label>
    <input class="field-input" type="text" [(ngModel)]="form.address"
      placeholder="5th Block, 80 Feet Road, Koramangala, Bangalore - 560095">
  </div>

  <div class="two-col">
    <div class="field-wrap">
      <label class="field-label">Phone number *</label>
      <input class="field-input" type="tel" [(ngModel)]="form.phone" placeholder="+91 98765 43210" maxlength="10"
        pattern="^\+91[0-9]{10}$">
    </div>
    <div class="field-wrap">
      <label class="field-label">Business email *</label>
      <input class="field-input" type="email" [(ngModel)]="form.email" placeholder="owner@salon.com">
    </div>
  </div>

  <div class="field-wrap">
    <label class="field-label">Salon description *</label>
    <textarea class="field-input field-textarea" [(ngModel)]="form.description"
      placeholder="Describe your salon's speciality, experience, and what makes it unique..."></textarea>
  </div>

  <div class="step-actions">
    <span></span>
    <button class="btn-next" (click)="onNext()">Next: Services →</button>
  </div>
</div>
